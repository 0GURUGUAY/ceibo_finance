services:
  - type: web
    name: ceibo-finance
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ceibo_finance.main:app --host 0.0.0.0 --port $PORT --app-dir src
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: prod
      - key: LOG_LEVEL
        value: INFO
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: "10000"
      - key: ALPACA_PAPER
        value: "true"
      - key: ALPACA_DATA_FEED
        value: iex
      - key: QUOTE_INTEL_REFRESH_MINUTES
        value: "15"
      - key: QUOTE_INTEL_DB_PATH
        value: data/quote_intel.db
      - key: VIEWER_TOKEN_DEFAULT_TTL_MINUTES
        value: "60"
      - key: VIEWER_TOKEN_SECRET
        generateValue: true
      - key: VIEWER_ADMIN_KEY
        generateValue: true
